version: '3'

services:

  frontend:
    build: ./Frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build: ./Backend
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notesdb
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:

